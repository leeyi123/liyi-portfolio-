<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>静物与光 — LILLY</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@100;200;300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
a,button{outline:none;-webkit-tap-highlight-color:transparent}
html,body{width:100%;background:#0a0a0a;color:#f0ebe0;font-family:'Raleway',sans-serif;font-weight:200;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* HEADER */
#header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:stretch;border-bottom:1px solid rgba(240,235,224,.08);background:rgba(10,10,10,.92);backdrop-filter:blur(12px)}
#back{display:flex;align-items:center;gap:.55rem;padding:0 2rem;font-size:.55rem;letter-spacing:.32em;text-transform:uppercase;color:rgba(240,235,224,.3);text-decoration:none;border-right:1px solid rgba(240,235,224,.08);flex-shrink:0;transition:color .25s}
#back:hover{color:#C5563B}
#back svg{fill:none;stroke:currentColor;stroke-width:1.2}
#info{flex:1;display:flex;align-items:center;overflow:hidden}
.info-block{padding:1.1rem 2rem;border-right:1px solid rgba(240,235,224,.06);flex-shrink:0}
.info-block:last-child{border-right:none}
.info-label{font-size:.48rem;letter-spacing:.34em;text-transform:uppercase;color:rgba(240,235,224,.3);display:block;margin-bottom:.3rem}
.info-val{font-size:.72rem;letter-spacing:.06em;color:rgba(240,235,224,.7);display:block}
.info-val.serif{font-family:'Cormorant Garamond',serif;font-size:.95rem;font-weight:300;font-style:italic;color:#f0ebe0}

/* HERO */
#hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8rem 4vw 6rem;position:relative;overflow:hidden}
#hero-bg{
  position:absolute;inset:0;z-index:0;
  background:url('../images/photo/photo-01.jpg') center/cover no-repeat;
}
#hero-bg::after{
  content:'';
  position:absolute;inset:0;
  background:rgba(0,0,0,.52);
}
.hero-content{position:relative;z-index:1}
.hero-eyebrow{font-size:.58rem;letter-spacing:.48em;text-transform:uppercase;color:rgba(240,235,224,.35);margin-bottom:1.4rem;display:block}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(3.5rem,9vw,8rem);font-weight:300;font-style:italic;color:#f0ebe0;line-height:1.05;letter-spacing:.03em;margin-bottom:1.2rem}
.hero-sub{font-size:.6rem;letter-spacing:.38em;text-transform:uppercase;color:rgba(240,235,224,.3)}

/* GRID */
#grid-section{padding:0}
.photo-full{
  width:100%;
  line-height:0;
  opacity:0;
  transform:translateY(60px);
  transition:opacity 1.1s cubic-bezier(.4,0,.2,1), transform 1.1s cubic-bezier(.4,0,.2,1);
}
.photo-full.revealed{opacity:1;transform:translateY(0)}
.photo-full img{width:100%;height:auto;display:block}

/* LIGHTBOX */
#lightbox{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .4s ease,visibility .4s ease;cursor:pointer}
#lightbox.show{opacity:1;visibility:visible}
#lightbox img{max-width:90vw;max-height:88vh;object-fit:contain;border-radius:2px;transform:scale(.95);transition:transform .4s cubic-bezier(.4,0,.2,1);cursor:default}
#lightbox.show img{transform:scale(1)}
#lb-close{position:absolute;top:2rem;right:2.5rem;font-size:.55rem;letter-spacing:.36em;text-transform:uppercase;color:rgba(240,235,224,.35);cursor:pointer;background:none;border:none;transition:color .2s}
#lb-close:hover{color:#f0ebe0}

/* FOOTER */
#footer{padding:4rem 3vw;border-top:1px solid rgba(240,235,224,.06);display:flex;align-items:center;justify-content:space-between}
.footer-sig{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:300;font-style:italic;color:rgba(240,235,224,.25);letter-spacing:.06em}
.footer-count{font-size:.52rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(240,235,224,.2)}

@media(max-width:768px){
  .photo-grid{grid-template-columns:1fr}
  .photo-cell.full{grid-column:span 1}
  .photo-cell.full .cell-img{aspect-ratio:4/3}
}
</style>
</head>
<body>

<div id="header">
  <a id="back" href="#" onclick="history.back();return false;">
    <svg width="12" height="10" viewBox="0 0 12 10"><path d="M7 1L2 5l5 4M2 5h10"/></svg>
    Back
  </a>
  <div id="info">
    <div class="info-block"><span class="info-label">Project</span><span class="info-val serif">静物与光</span></div>
    <div class="info-block"><span class="info-label">Year</span><span class="info-val">2021 — 2024</span></div>
    <div class="info-block"><span class="info-label">Medium</span><span class="info-val">Still Life · Product · Editorial</span></div>
  </div>
</div>

<div id="hero">
  <div id="hero-bg"></div>
  <div class="hero-content">
    <span class="hero-eyebrow">Photography · Still Life · Editorial</span>
    <h1 class="hero-title">静物与光</h1>
    <span class="hero-sub">2021 — 2024 · 7 Works</span>
  </div>
</div>

<div id="grid-section">
  <div class="photo-full"><img src="../images/photo/photo-02.jpg" loading="lazy" alt=""/></div>
  <div class="photo-full"><img src="../images/photo/photo-03.jpg" loading="lazy" alt=""/></div>
  <div class="photo-full"><img src="../images/photo/photo-04.jpg" loading="lazy" alt=""/></div>
  <div class="photo-full"><img src="../images/photo/photo-05.png" loading="lazy" alt=""/></div>
  <div class="photo-full"><img src="../images/photo/photo-06.jpg" loading="lazy" alt=""/></div>
  <div class="photo-full"><img src="../images/photo/photo-07.jpg" loading="lazy" alt=""/></div>
</div>

<div id="footer">
  <span class="footer-sig">Lilly · Photography</span>
  <span class="footer-count">7 Works · 2021—2024</span>
</div>

<div id="lightbox" onclick="closeLb()">
  <button id="lb-close">Close ×</button>
  <img id="lb-img" src="" alt=""/>
</div>

<script>
const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('revealed');obs.unobserve(e.target);}});
},{threshold:0.12, rootMargin:'0px 0px -80px 0px'});
document.querySelectorAll('.photo-full').forEach(el=>obs.observe(el));

function openLb(src){document.getElementById('lb-img').src=src;document.getElementById('lightbox').classList.add('show')}
function closeLb(){document.getElementById('lightbox').classList.remove('show')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb()});
</script>
</body>
</html>
