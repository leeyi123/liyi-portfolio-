<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LILLY — Player</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@100;200;300&display=swap" rel="stylesheet"/>
<script src="https://player.vimeo.com/api/player.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
a,button{outline:none;-webkit-tap-highlight-color:transparent;}
:root{
  --cream:#f0ebe0;
  --warm:#d4c9b0;
  --gold:#c4963c;
  --ink:#0c0a07;
}
html,body{
  width:100%;height:100%;
  background:var(--ink);
  color:var(--cream);
  font-family:'Raleway',sans-serif;
  font-weight:200;
  overflow:hidden;
}

/* ── VIDEO ── */
#video-wrap{
  position:fixed;inset:0;
  cursor:pointer;
}
#vid{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  cursor:pointer;
}
#vimeo-player{
  position:absolute;
  inset:0;
  overflow:hidden;
}
#vimeo-player iframe{
  position:absolute;
  top:50%;
  left:50%;
  width:100vw;
  height:56.25vw;
  min-width:177.78vh;
  min-height:100vh;
  transform:translate(-50%,-50%);
  border:0;
  pointer-events:none;
}
#vid.poster-only{
  background-position:center;
  background-size:cover;
  cursor:default;
}

/* scrim — only shows after end */
#scrim{
  position:fixed;inset:0;
  background:rgba(12,10,7,0);
  transition:background 1.2s ease;
  pointer-events:none;
}
#scrim.dark{background:rgba(12,10,7,0.72)}

/* ── TITLE (visible before/during play start, hides on play) ── */
#title-block{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:10;
  pointer-events:none;
  transition:opacity .8s ease, transform .8s ease;
}
#title-block.hide{
  opacity:0;
  transform:translate(-50%,-52%);
}
.t-num{
  font-size:.62rem;letter-spacing:.42em;
  text-transform:uppercase;color:var(--gold);
  display:block;margin-bottom:.8rem;
}
.t-name{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(3.5rem,8vw,8rem);
  font-weight:300;font-style:italic;
  color:var(--cream);line-height:1.05;
  letter-spacing:.03em;
  text-shadow:0 4px 60px rgba(0,0,0,.7);
  display:block;
}
.t-sub{
  margin-top:.8rem;
  font-size:.62rem;letter-spacing:.32em;
  text-transform:uppercase;color:var(--warm);
  opacity:.7;display:block;
}

/* ── PLAY BUTTON (center, before play) ── */
#play-btn{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%, 4rem);
  z-index:11;
  width:56px;height:56px;
  border:1px solid rgba(240,235,224,.35);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:opacity .6s ease, border-color .3s, background .3s;
}
#play-btn svg{
  fill:var(--cream);
  margin-left:3px;
}
#play-btn:hover{border-color:var(--gold);background:rgba(196,150,60,.15)}
#play-btn.hide{opacity:0;pointer-events:none}

/* ── END CARD (shown after video ends) ── */
#end-card{
  position:fixed;inset:0;
  z-index:20;
  display:flex;
  pointer-events:none;
  opacity:0;
  transition:opacity 1s ease;
}
#end-card.show{opacity:1;pointer-events:all}

/* left: big title */
.end-left{
  flex:1;
  display:flex;flex-direction:column;
  justify-content:center;
  padding:0 6vw;
  border-right:1px solid rgba(240,235,224,.1);
}
.end-num{
  font-size:.62rem;letter-spacing:.42em;
  text-transform:uppercase;color:var(--gold);
  display:block;margin-bottom:1rem;
}
.end-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.5rem,5vw,5.5rem);
  font-weight:300;font-style:italic;
  color:var(--cream);line-height:1.1;
  letter-spacing:.02em;
}
.end-subtitle{
  margin-top:1.2rem;
  font-family:'Cormorant Garamond',serif;
  font-size:1rem;font-style:italic;
  color:rgba(240,235,224,.65);
  line-height:1.5;max-width:480px;
}
.end-replay{
  margin-top:2.4rem;
  display:inline-flex;align-items:center;gap:.7rem;
  font-size:.58rem;letter-spacing:.3em;text-transform:uppercase;
  color:var(--gold);cursor:pointer;
  border:none;background:transparent;padding:0;
  transition:opacity .2s;
}
.end-replay:hover{opacity:.7}
.end-replay svg{fill:var(--gold)}

/* right: meta grid */
.end-right{
  width:360px;
  display:flex;flex-direction:column;
  justify-content:center;
  padding:0 5vw;
}
.end-meta-title{
  font-size:.55rem;letter-spacing:.38em;
  text-transform:uppercase;color:var(--warm);
  opacity:.5;margin-bottom:1.8rem;display:block;
}
.meta-rows{display:flex;flex-direction:column;gap:1.4rem}
.meta-row{}
.meta-label{
  font-size:.52rem;letter-spacing:.32em;
  text-transform:uppercase;color:var(--warm);
  display:block;opacity:.6;margin-bottom:.25rem;
}
.meta-val{
  font-size:.8rem;letter-spacing:.06em;
  color:var(--cream);display:block;
}

/* ── BACK BUTTON ── */
#back{
  position:fixed;
  top:2.2rem;left:2.5vw;
  z-index:30;
  display:flex;align-items:center;gap:.6rem;
  font-size:.58rem;letter-spacing:.3em;text-transform:uppercase;
  color:rgba(240,235,224,.4);
  cursor:pointer;
  text-decoration:none;
  border:none;outline:none;background:none;
  transition:color .25s;
}
#back:hover{color:var(--cream)}
#back svg{fill:currentColor}

/* ── PROGRESS BAR ── */
#progress-wrap{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:25;
  padding:0 3vw 2.2rem;
  opacity:0;
  transition:opacity .4s;
}
#progress-wrap.show{opacity:1}

#progress-track{
  width:100%;
  height:28px; /* large hit area */
  display:flex;align-items:center;
  cursor:pointer;
  position:relative;
}
#progress-bg{
  width:100%;height:2px;
  background:rgba(240,235,224,.18);
  position:relative;
  transition:height .2s;
}
#progress-track:hover #progress-bg{ height:3px; }

#progress-fill{
  height:100%;background:var(--gold);
  width:0%;
  pointer-events:none;
  position:relative;
}
/* scrub thumb */
#progress-fill::after{
  content:'';
  position:absolute;right:-5px;top:50%;
  transform:translateY(-50%) scale(0);
  width:10px;height:10px;border-radius:50%;
  background:var(--gold);
  transition:transform .2s;
}
#progress-track:hover #progress-fill::after{ transform:translateY(-50%) scale(1); }

/* hover time tooltip */
#progress-tooltip{
  position:absolute;
  bottom:calc(100% + 8px);
  transform:translateX(-50%);
  font-size:.52rem;letter-spacing:.18em;
  color:var(--cream);
  background:rgba(0,0,0,.65);
  padding:.2rem .5rem;
  pointer-events:none;
  opacity:0;
  transition:opacity .15s;
  white-space:nowrap;
}
#progress-track:hover #progress-tooltip{ opacity:1; }

.time-row{
  display:flex;justify-content:space-between;
  margin-top:.5rem;
  align-items:center;
}
.time-val{
  font-size:.55rem;letter-spacing:.2em;
  color:rgba(240,235,224,.35);
}
/* centre controls row */
.ctrl-row{
  display:flex;align-items:center;justify-content:center;
  gap:2rem;margin-bottom:.6rem;
}
.ctrl-btn{
  background:none;border:none;padding:0;cursor:pointer;
  color:rgba(240,235,224,.5);
  font-size:.55rem;letter-spacing:.28em;text-transform:uppercase;
  display:flex;align-items:center;gap:.4rem;
  transition:color .2s;
}
.ctrl-btn:hover{color:var(--cream)}
.ctrl-btn svg{fill:currentColor}
#pause-icon{display:none}
</style>
</head>
<body>

<a id="back" href="#" onclick="history.back();return false;">
  <svg width="12" height="12" viewBox="0 0 12 12">
    <path d="M8 1L3 6l5 5" stroke="currentColor" stroke-width="1" fill="none"/>
  </svg>
  Back
</a>

<div id="video-wrap">
  <video id="vid" playsinline></video>
</div>

<div id="scrim"></div>

<!-- Title shown before & at start -->
<div id="title-block">
  <span class="t-num" id="t-num"></span>
  <span class="t-name" id="t-name"></span>
  <span class="t-sub" id="t-sub"></span>
</div>

<!-- Play button -->
<div id="play-btn" onclick="startPlay()">
  <svg width="16" height="18" viewBox="0 0 16 18">
    <path d="M1 1l14 8.5L1 17V1z"/>
  </svg>
</div>

<!-- Progress bar -->
<div id="progress-wrap">
  <div class="ctrl-row">
    <button class="ctrl-btn" onclick="skip(-10)">
      <svg width="13" height="13" viewBox="0 0 13 13"><path d="M6.5 1A5.5 5.5 0 1 0 12 6.5" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M6.5 1 L3.5 3.5 L6.5 6" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
      −10s
    </button>
    <button class="ctrl-btn" id="play-pause-btn" onclick="togglePlay()">
      <svg id="play-icon" width="12" height="14" viewBox="0 0 12 14"><path d="M1 1l10 6-10 6V1z"/></svg>
      <svg id="pause-icon" width="12" height="14" viewBox="0 0 12 14"><rect x="1" y="1" width="3.5" height="12" rx=".5"/><rect x="7.5" y="1" width="3.5" height="12" rx=".5"/></svg>
      <span id="pp-label">Play</span>
    </button>
    <button class="ctrl-btn" onclick="skip(10)">
      +10s
      <svg width="13" height="13" viewBox="0 0 13 13"><path d="M6.5 1A5.5 5.5 0 1 1 1 6.5" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M6.5 1 L9.5 3.5 L6.5 6" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
    </button>
  </div>
  <div id="progress-track"
       onmousedown="startDrag(event)"
       onmousemove="hoverTrack(event)"
       onclick="seekClick(event)">
    <div id="progress-bg">
      <div id="progress-fill"></div>
    </div>
    <div id="progress-tooltip">0:00</div>
  </div>
  <div class="time-row">
    <span class="time-val" id="time-cur">0:00</span>
    <span class="time-val" id="time-dur">0:00</span>
  </div>
</div>

<!-- End card -->
<div id="end-card">
  <div class="end-left">
    <span class="end-num" id="end-num"></span>
    <h1 class="end-title" id="end-title"></h1>
    <p class="end-subtitle" id="end-subtitle"></p>
    <button class="end-replay" onclick="replay()">
      <svg width="12" height="12" viewBox="0 0 12 12">
        <path d="M10 6A4 4 0 112 6" stroke="currentColor" stroke-width="1" fill="none"/>
        <path d="M10 3v3h-3" stroke="currentColor" stroke-width="1" fill="none"/>
      </svg>
      重新播放
    </button>
  </div>
  <div class="end-right">
    <span class="end-meta-title">Project Details</span>
    <div class="meta-rows" id="meta-rows"></div>
  </div>
</div>

<script>
/* ── 从 URL 参数读取项目索引 ── */
const params = new URLSearchParams(location.search);
const idx = parseInt(params.get('i') || '0');

/* ── 项目数据（与 index.html 保持一致） ── */
const PROJECTS = [
  {
    num:"01", title:"张恩利", subtitle:"仓库 I II",
    image:"images/1.jpg",
    vimeoId:"1189575682",
    meta:[
      {l:"Year",  v:"2025SS"},
      {l:"Client",v:"西泠拍卖"},
      {l:"Role",  v:"Film Producer"},
      {l:"Medium",v:"Video"}
    ]
  },
  {
    num:"02", title:"冰上鸿飞", subtitle:"2025杭州艺术季开幕片",
    image:"images/2.jpg",
    vimeoId:"1189581990",
    meta:[
      {l:"Year",  v:"2025AW"},
      {l:"Client",v:"西泠拍卖"},
      {l:"Role",  v:"Art Director, Film Producer"},
      {l:"Medium",v:"Video"}
    ]
  },
  {
    num:"03", title:"外公的礼物", subtitle:"黄宾虹诞辰一百六十周年纪念短片",
    image:"images/3.jpg",
    vimeoId:"1189579603",
    meta:[
      {l:"Year",v:"2025AW"},
      {l:"Role",v:"Art Director, Film Producer"}
    ]
  },
  {
    num:"04", title:"西泠拍卖二十周年纪念片", subtitle:"历史是为了创造未来而存在的",
    image:"images/4.jpg",
    vimeoId:"1189580456",
    meta:[
      {l:"Year",v:"2024"},
      {l:"Role",v:"Production Designer"}
    ]
  },
  {
    num:"05", title:"相识·古今中外的石头专场", subtitle:"与古人相识，与文人重逢",
    image:"images/5.jpg",
    meta:[
      {l:"Year",v:"2024"},
      {l:"Role",v:"Art Director, Film Producer"}
    ]
  },
  {
    num:"06", title:"黄丕烈题跋铁崖先生古乐府讲解", subtitle:"南大金程宇教授讲解存世黄跋翘楚《铁崖先生古乐府》",
    image:"images/6.jpg",
    meta:[
      {l:"Year",v:"2025"},
      {l:"Role",v:"Production Designer, Film Producer"}
    ]
  }
];

const p = PROJECTS[idx] || PROJECTS[0];
const vid = document.getElementById('vid');
const videoWrap = document.getElementById('video-wrap');
let vimeoPlayer = null;
let vimeoDuration = 0;
let vimeoCurrent = 0;
let vimeoPaused = true;

/* populate title */
document.getElementById('t-num').textContent = p.num;
document.getElementById('t-name').textContent = p.title;
document.getElementById('t-sub').textContent = p.subtitle;
document.title = p.title + ' — LILLY';

/* populate end card */
document.getElementById('end-num').textContent = p.num;
document.getElementById('end-title').textContent = p.title;
document.getElementById('end-subtitle').textContent = p.subtitle;
document.getElementById('meta-rows').innerHTML = p.meta.map(m=>`
  <div class="meta-row">
    <span class="meta-label">${m.l}</span>
    <span class="meta-val">${m.v}</span>
  </div>`).join('');

/* load video, Vimeo, or deployment poster */
if(p.vimeoId && window.Vimeo){
  vid.remove();
  const mount = document.createElement('div');
  mount.id = 'vimeo-player';
  videoWrap.appendChild(mount);

  vimeoPlayer = new Vimeo.Player(mount, {
    id: p.vimeoId,
    autopause: false,
    controls: false,
    muted: false,
    playsinline: true,
    responsive: false,
    title: false,
    byline: false,
    portrait: false,
    width: 1920
  });

  vimeoPlayer.ready().then(()=>{
    const iframe = mount.querySelector('iframe');
    if(iframe) iframe.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture');
    return vimeoPlayer.getDuration();
  }).then(duration=>{
    vimeoDuration = duration || 0;
    document.getElementById('time-dur').textContent = fmt(vimeoDuration);
  }).catch(()=>{});

  vimeoPlayer.on('play', ()=>{
    vimeoPaused = false;
    updatePlayPauseBtn();
  });
  vimeoPlayer.on('pause', ()=>{
    vimeoPaused = true;
    updatePlayPauseBtn();
  });
  vimeoPlayer.on('timeupdate', data=>{
    vimeoCurrent = data.seconds || 0;
    vimeoDuration = data.duration || vimeoDuration;
    if(vimeoDuration){
      const pct = (vimeoCurrent / vimeoDuration)*100;
      document.getElementById('progress-fill').style.width = pct+'%';
      document.getElementById('time-cur').textContent = fmt(vimeoCurrent);
      document.getElementById('time-dur').textContent = fmt(vimeoDuration);
    }
  });
  vimeoPlayer.on('ended', showEndCard);
}else if(p.video){
  vid.src = p.video;
  vid.load();
}else{
  vid.classList.add('poster-only');
  vid.style.backgroundImage = `linear-gradient(rgba(12,10,7,.24),rgba(12,10,7,.46)),url('${p.image}')`;
  document.getElementById('play-btn').classList.add('hide');
  document.getElementById('progress-wrap').style.display = 'none';
}

/* ── controls ── */
let dragging = false;

function startPlay(){
  if(vimeoPlayer){
    vimeoPlayer.play();
  }else{
    vid.play();
  }
  document.getElementById('play-btn').classList.add('hide');
  document.getElementById('title-block').classList.add('hide');
  document.getElementById('progress-wrap').classList.add('show');
  updatePlayPauseBtn();
}

function togglePlay(){
  if(vimeoPlayer){
    if(vimeoPaused){ vimeoPlayer.play(); } else { vimeoPlayer.pause(); }
  }else{
    if(vid.paused){ vid.play(); } else { vid.pause(); }
  }
}

function skip(sec){
  if(vimeoPlayer){
    const next = Math.max(0, Math.min(vimeoDuration || 0, vimeoCurrent + sec));
    vimeoPlayer.setCurrentTime(next);
  }else{
    vid.currentTime = Math.max(0, Math.min(vid.duration, vid.currentTime + sec));
  }
}

function updatePlayPauseBtn(){
  const paused = vimeoPlayer ? vimeoPaused : vid.paused;
  document.getElementById('play-icon').style.display  = paused ? 'block' : 'none';
  document.getElementById('pause-icon').style.display = paused ? 'none'  : 'block';
  document.getElementById('pp-label').textContent     = paused ? 'Play'  : 'Pause';
}

function replay(){
  document.getElementById('end-card').classList.remove('show');
  document.getElementById('scrim').classList.remove('dark');
  if(vimeoPlayer){
    vimeoPlayer.setCurrentTime(0).then(()=>vimeoPlayer.play());
  }else{
    vid.currentTime = 0;
    vid.play();
  }
  document.getElementById('progress-wrap').classList.add('show');
}

function fmt(s){
  if(isNaN(s)) return '0:00';
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60);
  return m+':'+(sec<10?'0':'')+sec;
}

function posToTime(e){
  const track = document.getElementById('progress-track');
  const rect = track.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  return ratio * (vimeoPlayer ? vimeoDuration : (vid.duration || 0));
}

function seekClick(e){
  if(dragging) return;
  const t = posToTime(e);
  if(vimeoPlayer){ vimeoPlayer.setCurrentTime(t); }
  else{ vid.currentTime = t; }
}

function hoverTrack(e){
  const t = posToTime(e);
  const tip = document.getElementById('progress-tooltip');
  const track = document.getElementById('progress-track');
  const rect = track.getBoundingClientRect();
  const x = e.clientX - rect.left;
  tip.style.left = x + 'px';
  tip.textContent = fmt(t);
}

function startDrag(e){
  dragging = true;
  const setTime = t => {
    if(vimeoPlayer){ vimeoPlayer.setCurrentTime(t); }
    else{ vid.currentTime = t; }
  };
  setTime(posToTime(e));
  const onMove = ev => { if(dragging) setTime(posToTime(ev)); };
  const onUp   = ()  => { dragging = false; document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

/* click video to pause/resume */
videoWrap.addEventListener('click', ()=>{
  if(!vimeoPlayer && vid.ended) return;
  togglePlay();
});

vid.addEventListener('play',  updatePlayPauseBtn);
vid.addEventListener('pause', updatePlayPauseBtn);

vid.addEventListener('timeupdate', ()=>{
  if(!vid.duration) return;
  const pct = (vid.currentTime / vid.duration)*100;
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('time-cur').textContent = fmt(vid.currentTime);
});

vid.addEventListener('loadedmetadata', ()=>{
  document.getElementById('time-dur').textContent = fmt(vid.duration);
});

function showEndCard(){
  document.getElementById('progress-wrap').classList.remove('show');
  document.getElementById('scrim').classList.add('dark');
  setTimeout(()=>{ document.getElementById('end-card').classList.add('show'); }, 800);
}

vid.addEventListener('ended', showEndCard);

/* keyboard shortcuts */
document.addEventListener('keydown', e=>{
  if(e.key === ' '||e.key === 'k'){ e.preventDefault(); togglePlay(); }
  if(e.key === 'ArrowRight') skip(10);
  if(e.key === 'ArrowLeft')  skip(-10);
  if(e.key === 'ArrowUp')    skip(30);
  if(e.key === 'ArrowDown')  skip(-30);
});
</script>
</body>
</html>
